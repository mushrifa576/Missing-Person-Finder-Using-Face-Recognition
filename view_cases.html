<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Missing Person Cases</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* PAGE */

body{
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
}

/* GLASS CARD */

.cases-card{
width:900px;
padding:35px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* TITLE */

.cases-card h2{
text-align:center;
margin-bottom:20px;
font-size:30px;
color:white;
}

/* SCROLLABLE TABLE */

.table-container{
max-height:400px;
overflow-y:auto;
}

/* TABLE */

.cases-table{
width:100%;
border-collapse:collapse;
}

.cases-table th{
background:#0072ff;
color:white;
padding:14px;
text-align:left;
position:sticky;
top:0;
}

.cases-table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.15);
color:#eee;
}

/* ROW HOVER */

.cases-table tr:hover{
background:rgba(0,229,255,0.1);
}

/* STATUS */

.status{
padding:5px 12px;
border-radius:15px;
font-size:12px;
font-weight:bold;
}

.missing{
background:#ff4d4d;
}

.found{
background:#00c853;
}

/* BACK BUTTON */

.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
background:linear-gradient(90deg,#0072ff,#00c6ff);
color:white;
font-weight:bold;
transition:0.3s;
}

.back-btn:hover{
box-shadow:0 0 15px #00e5ff;
}

</style>

</head>

<body>

<div class="cases-card">

<h2><i class="fa fa-folder-open"></i> Missing Person Cases</h2>

<div class="table-container">

<table class="cases-table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Status</th>
</tr>

{% for case in cases %}
<tr>
<td>{{ case[0] }}</td>
<td>{{ case[1] }}</td>
<td>{{ case[2] }}</td>

<td>
{% if case[3] == "Found" %}
<span class="status found">Found</span>
{% else %}
<span class="status missing">Missing</span>
{% endif %}
</td>

</tr>
{% endfor %}

</table>

</div>

<a class="back-btn" href="/admin_dashboard">← Back to Admin Dashboard</a>

</div>

</body>
</html>
