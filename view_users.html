<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registered Users</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* PAGE CENTER */

.users-wrapper{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* GLASS CARD */

.users-card{
width:750px;
padding:35px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* TITLE */

.users-card h2{
text-align:center;
margin-bottom:25px;
font-size:30px;
color:white;
}

/* TABLE */

.users-table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

.users-table th{
background:#0072ff;
color:white;
padding:12px;
text-align:left;
}

.users-table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
color:#eee;
}

/* ROW HOVER */

.users-table tr:hover{
background:rgba(0,229,255,0.1);
}

/* BACK BUTTON */

.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
background:linear-gradient(90deg,#0072ff,#00c6ff);
color:white;
font-weight:bold;
transition:0.3s;
}

.back-btn:hover{
box-shadow:0 0 15px #00e5ff;
}

</style>

</head>

<body>

<div class="users-wrapper">

<div class="users-card">

<h2><i class="fa fa-users"></i> Registered Users</h2>

<table class="users-table">

<tr>
<th>ID</th>
<th>Username</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>
</tr>
{% endfor %}

</table>

<a class="back-btn" href="/admin_dashboard">← Back to Admin Dashboard</a>

</div>

</div>

</body>
</html>
