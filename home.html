<!DOCTYPE html>
<html>
<head>
<title>Missing Person Identification System</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;

    background: linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
    url("/static/icons/bg2.jpg");

    background-size: cover;
    background-position: center;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:rgba(253, 241, 241, 0.987);
}

/* container card */

.container{
    /*background: rgba(95, 94, 94, 0.7);*/
    padding:60px;
    border-radius:14px;
    width:60%;
    box-shadow:0 12px 30px rgba(95, 84, 84, 0.7);
}

/* heading */

h1{
    font-size:50px;
    letter-spacing:3px;
    margin-bottom:25px;
    font-weight:bold;

    text-shadow:
    0 0 10px rgba(255, 255, 255, 0.446),
    0 0 20px rgba(0,0,0,0.8);
}

/* paragraph */

p{
    font-size:20px;
    line-height:1.7;
    margin-bottom:40px;
    font-style: italic;
    color:hsl(0, 43%, 99%);
}

/* button */

.btn{
    text-decoration:none;
    padding:15px 35px;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:#005cc5;
    border-radius:8px;
    transition: all 0.3s ease;
    letter-spacing:1px;
}

/* hover effect */

.btn:hover{
    background:#0056b3;
    transform:scale(1.08);
    box-shadow:0 6px 15px rgba(93, 88, 88, 0.6);
}

</style>

</head>

<body>

<div class="container">

<h1>MISSING PERSON FINDER</h1>

<p>
Every missing person matters.  
Every search brings hope.  
Every reunion changes lives.
</p>

<a href="/index" class="btn">Get Started</a>

</div>

</body>
</html>
