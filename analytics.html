<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Analytics</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* CENTER PAGE */

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* GLASS CARD */

.analytics-card{
width:700px;
padding:40px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
}

/* TITLE */

.analytics-card h2{
font-size:32px;
margin-bottom:30px;
color:white;
}

/* GRID */

.analytics-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:25px;
}

/* SMALL CARDS */

.stat-box{
padding:25px;
border-radius:12px;
background:rgba(255,255,255,0.1);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.stat-box:hover{
transform:translateY(-5px);
box-shadow:0 0 15px #00e5ff;
}

.stat-box i{
font-size:28px;
margin-bottom:10px;
color:#00e5ff;
}

.stat-number{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

.stat-label{
font-size:14px;
color:#ccc;
}

/* BACK BUTTON */

.back-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
background:linear-gradient(90deg,#0072ff,#00c6ff);
color:white;
font-weight:bold;
transition:0.3s;
}

.back-btn:hover{
box-shadow:0 0 15px #00e5ff;
}

</style>

</head>

<body>

<div class="analytics-card">

<h2><i class="fa fa-chart-line"></i> System Analytics</h2>

<div class="analytics-grid">

<div class="stat-box">
<i class="fa fa-users"></i>
<div class="stat-number">{{ total_users }}</div>
<div class="stat-label">Total Users</div>
</div>

<div class="stat-box">
<i class="fa fa-folder-open"></i>
<div class="stat-number">{{ total_cases }}</div>
<div class="stat-label">Total Cases</div>
</div>

<div class="stat-box">
<i class="fa fa-check-circle"></i>
<div class="stat-number">{{ total_found }}</div>
<div class="stat-label">Total Found</div>
</div>

</div>

<a class="back-btn" href="/admin_dashboard">← Back to Admin Dashboard</a>

</div>

</body>
</html>
