<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* CENTER PAGE */

.admin-wrapper{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

/* TITLE */

.admin-title{
font-size:40px;
margin-bottom:40px;
color:white;
text-shadow:0 0 15px #00e5ff;
}

/* GRID */

.admin-grid{
display:grid;
grid-template-columns:repeat(3,220px);
gap:30px;
}

/* CARD */

.admin-card{
padding:30px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
transition:0.3s;
cursor:pointer;
text-decoration:none;
color:white;
}

/* HOVER */

.admin-card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #00e5ff;
}

/* ICON */

.admin-card i{
font-size:36px;
margin-bottom:15px;
color:#00e5ff;
}

/* TEXT */

.admin-card h3{
margin:0;
font-size:18px;
}

</style>

</head>

<body>

<div class="admin-wrapper">

<h1 class="admin-title">Admin Control Panel</h1>

<div class="admin-grid">

<a class="admin-card" href="/view_users">
<i class="fa fa-users"></i>
<h3>View Users</h3>
</a>

<a class="admin-card" href="/view_cases">
<i class="fa fa-folder-open"></i>
<h3>Missing Cases</h3>
</a>

<a class="admin-card" href="/analytics">
<i class="fa fa-chart-line"></i>
<h3>Analytics</h3>
</a>

<a class="admin-card" href="/admin_upload_search">
<i class="fa fa-search"></i>
<h3>Upload & Search</h3>
</a>

<a class="admin-card" href="/admin_upload_video">
<i class="fa fa-video"></i>
<h3>Upload CCTV</h3>
</a>

<a class="admin-card" href="/logout">
<i class="fa fa-sign-out-alt"></i>
<h3>Logout</h3>
</a>

</div>

</div>

</body>
</html>
