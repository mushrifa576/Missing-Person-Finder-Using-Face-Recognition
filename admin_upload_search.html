<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Upload & Search</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* PAGE CENTER */

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* GLASS PANEL */

.search-card{
width:450px;
padding:35px;
border-radius:15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* TITLE */

.search-card h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
color:white;
}

/* INPUT GROUP */

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

/* BUTTON */

.search-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#0072ff,#00c6ff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.search-btn:hover{
box-shadow:0 0 15px #00e5ff;
transform:scale(1.05);
}

/* RESULT BOX */

.result-box{
margin-top:20px;
padding:15px;
border-radius:10px;
background:rgba(255,255,255,0.1);
}

/* BACK BUTTON */

.back-btn{
display:inline-block;
margin-top:15px;
padding:8px 16px;
border-radius:6px;
text-decoration:none;
background:linear-gradient(90deg,#0072ff,#00c6ff);
color:white;
font-weight:bold;
}

.back-btn:hover{
box-shadow:0 0 10px #00e5ff;
}

</style>

</head>

<body>

<div class="search-card">

<h2><i class="fa fa-search"></i> Admin Upload & Search</h2>

<form method="POST" enctype="multipart/form-data">

<div class="input-group">
<input type="text" name="name" placeholder="Missing Person Name" required>
</div>

<div class="input-group">
<input type="number" name="age" placeholder="Age" required>
</div>

<div class="input-group">
<input type="file" name="photo" required>
</div>

<button class="search-btn" type="submit">Upload & Search</button>

</form>

{% if result_name %}
<div class="result-box">
<h3>Search Result</h3>
<p><strong>Match:</strong> {{ result_name }}</p>
<p><strong>Similarity:</strong> {{ score }}</p>
</div>
{% endif %}

<a class="back-btn" href="/admin_dashboard">← Back</a>

</div>

</body>
</html>
